name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build site
        run: just build

      - name: Validate HTML
        run: just check-html

      - name: Validate reader mode
        run: |
          node scripts/check-reader-mode.mjs dist/index.html
          node scripts/check-reader-mode.mjs dist/episodios/index.html
          node scripts/check-reader-mode.mjs dist/textos/index.html

      - name: Verify artifacts
        run: |
          test -f dist/search-index.json || { echo "Missing search-index.json"; exit 1; }
          test -f dist/core.mjs || { echo "Missing core.mjs"; exit 1; }
          test -f dist/404.html || { echo "Missing 404.html"; exit 1; }
          test -d dist/episodios || { echo "Missing episodios/"; exit 1; }
          test -d dist/textos || { echo "Missing textos/"; exit 1; }

      - name: JS smoke test
        run: just check-js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4