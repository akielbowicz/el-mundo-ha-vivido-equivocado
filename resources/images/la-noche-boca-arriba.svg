<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1b2e"/>
      <stop offset="100%" style="stop-color:#1a2d4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a9bb5"/>
      <stop offset="100%" style="stop-color:#9ab5d0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="8" fill="url(#bg1)"/>
  <rect x="20" y="20" width="360" height="360" rx="6" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <!-- Decorative wave -->
  <path d="M 60 120 Q 100 90 140 120 T 220 120 T 300 120 T 340 120" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.25"/>
  <path d="M 60 140 Q 100 170 140 140 T 220 140 T 300 140 T 340 140" fill="none" stroke="url(#accent)" stroke-width="0.5" opacity="0.15"/>
  <rect x="60" y="298" width="280" height="2" fill="url(#accent)" opacity="0.6"/>
  <!-- Feather motif -->
  <path d="M 200 170 L 220 220 L 200 210 L 180 220 Z" fill="url(#accent)" opacity="0.12"/>
  <!-- Title -->
  <text x="200" y="160" text-anchor="middle" fill="url(#accent)" font-family="Georgia, serif" font-size="20" font-weight="bold">La noche</text>
  <text x="200" y="185" text-anchor="middle" fill="url(#accent)" font-family="Georgia, serif" font-size="20" font-weight="bold">boca arriba</text>
  <text x="200" y="215" text-anchor="middle" fill="#7a9bb5" font-family="Georgia, serif" font-size="11" opacity="0.7">Julio Cortázar</text>
  <!-- Episode badge -->
  <rect x="140" y="260" width="120" height="24" rx="12" fill="url(#accent)" opacity="0.2"/>
  <text x="200" y="277" text-anchor="middle" fill="url(#accent)" font-family="sans-serif" font-size="11" font-weight="600">EPISODIO 2</text>
  <!-- Ornament -->
  <text x="200" y="330" text-anchor="middle" fill="#7a9bb5" font-family="sans-serif" font-size="14" opacity="0.3">❋ ❋ ❋</text>
</svg>