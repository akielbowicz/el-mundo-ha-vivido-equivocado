<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{description}}">
<title>{{title}} — El mundo ha vivido equivocado</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<a href="#main-content" class="skip-link">Saltar al contenido principal</a>
<header>
<div class="container">
<p class="breadcrumb"><a href="/">Inicio</a> / {{title}}</p>
<h1 class="site-title">{{title}}</h1>
<nav aria-label="Principal">
<ul>
<li><a href="/">Inicio</a></li>
<li><a href="/episodios/">Episodios</a></li>
<li><a href="/sobre/">Sobre el programa</a></li>
<li><a href="/contacto/">Sugerir un cuento</a></li>
</ul>
</nav>
</div>
</header>
<main id="main-content">
<div class="container">
<div class="page-content">
{{content}}
</div>
</div>
</main>
<footer>
<div class="container">
<p>© 2026 El mundo ha vivido equivocado</p>
</div>
</footer>

<div id="global-player" class="global-player" hidden>
  <div class="container global-player-inner">
    <button type="button" class="global-play-btn" id="global-play-btn" aria-label="Reproducir">▶</button>
    <div class="global-info">
      <span class="global-title" id="global-title"></span>
      <span class="global-author" id="global-author"></span>
    </div>
    <div class="global-progress">
      <span class="global-time" id="global-current">0:00</span>
      <input type="range" class="global-range" id="global-range" value="0" min="0" max="100" step="0.1" aria-label="Progreso">
      <span class="global-time" id="global-duration">0:00</span>
    </div>
    <button type="button" class="global-close" id="global-close" aria-label="Cerrar reproductor">✕</button>
  </div>
  <audio id="global-audio" preload="none"></audio>
</div>

<script type="module" src="/core.mjs"></script>
</body>
</html>
